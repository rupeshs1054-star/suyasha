<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Love Journey</title>
    <!-- Use Google Fonts for a High-end Look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="assets/love-beats.mp3" type="audio/mpeg">
    </audio>

    <!-- Canvas for Watery Love Bubbles -->
    <canvas id="bubble-canvas"></canvas>

    <!-- Main Vertical Slider Container -->
    <main class="slider-container">
        <!-- Content wrappers -->
        <div class="slider-wrapper" id="slider-wrapper">
            <!-- Slides are dynamically generated by script.js here -->
        </div>
    </main>

    <!-- Cursor Trail Layer -->
    <div id="cursor-trail-layer"></div>

    <!-- Draggable Heart Navigation System -->
    <div id="drag-container">
        <div id="target-heart" class="heart-indicator target"></div>
        <div id="draggable-heart" class="heart-indicator draggable"></div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
